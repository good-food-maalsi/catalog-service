apiVersion: apps/v1
kind: Deployment
metadata:
    name: catalog-service
    labels:
        app: catalog-service
spec:
    replicas: 1
    revisionHistoryLimit: 3
    selector:
        matchLabels:
            app: catalog-service
    template:
        metadata:
            labels:
                app: catalog-service
        spec:
            imagePullSecrets:
                - name: scw-registry-secret
            containers:
                - name: catalog-service
                  image: rg.fr-par.scw.cloud/good-food-container-registry/catalog-service:f20b805af1e89d2c173492a6da6c50c4a6a483a2
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 8080
                  resources:
                      requests:
                          memory: "32Mi"
                          cpu: "10m"
                      limits:
                          memory: "64Mi"
                          cpu: "200m"
                  envFrom:
                      - configMapRef:
                            name: catalog-service-config
                      - secretRef:
                            name: catalog-service-db-secret
                      - secretRef:
                            name: good-food-jwt-secret
---
apiVersion: v1
kind: Service
metadata:
    name: catalog-service
spec:
    selector:
        app: catalog-service
    ports:
        - protocol: TCP
          port: 8080
          targetPort: 8080
